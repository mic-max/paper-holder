<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paper Holder SVG Generator</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Paper Holder Generator</h1>
    <div class="topbar-group">
      <label>Profile</label>
      <select id="profileSelect"></select>
      <button id="saveAsBtn">Save As</button>
      <button id="deleteBtn">Delete</button>
      <button id="resetBtn">Reset</button>
    </div>
    <label class="topbar-item">
      <input type="checkbox" id="grainToggle" />
      Show grain direction
    </label>
    <button id="downloadAll">Download All (zip)</button>
    <span id="finalDims" class="topbar-item final-dims" title="Assembled W × H × thickness. Thickness = (interior layers + cover + back) × material + 2 × leather."></span>
  </header>
  <main>
    <aside id="form" class="sidebar"></aside>
    <section id="previews" class="previews"></section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
